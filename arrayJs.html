<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array in JS</title>
</head>
<body>
    <script>
        // array is collection of any data types
        let num=[3,5,6,7,8,9,10,12,14,6];

        //lastIndexOf() returns the index of the last occurrence of a specified value.
        console.log(num.lastIndexOf(14));

        console.log("lenght is " + num.length);
        // remove last element from array
        console.log(num.pop());
        console.log("updated array " + num);
 //add element in the last of the array
        console.log(num.push(99));
        console.log("update array after push method " + num);

        //shift and unshift
        // shift:- Removes the first element from an array and returns that element.
        console.log(num.shift());
        console.log(`updated array after shift ${num}`);
        //unshift Adds one or more elements to the beginning of an array and returns the new length.

        console.log(num.unshift(45));
        console.log(`udpated array after unshift ${num}`);
        // slice and splice


    </script>
</body>
</html>
